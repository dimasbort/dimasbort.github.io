<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Барбершоп Андрей Палыч</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #111;
      font-family: "Montserrat", sans-serif;
      color: #fff;
      margin: 0;
      min-height: 100vh;
    }
    .cabinet-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .cabinet-header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .cabinet-header h1 {
      font-size: 28px;
      color: #b59e5c;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .cabinet-header p {
      color: #888;
      margin: 0;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    .login-form {
      max-width: 400px;
      margin: 0 auto;
    }
    .booking-input {
      width: 100%;
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 14px;
      box-sizing: border-box;
    }
    .booking-input:focus {
      border-color: #b59e5c;
      outline: none;
    }
    .booking-btn {
      width: 100%;
      padding: 14px;
      background: #b59e5c;
      color: #000;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
    }
    .booking-btn:hover {
      background: #f3c46d;
    }
    .booking-btn.small {
      width: auto;
      padding: 8px 16px;
      font-size: 14px;
    }
    .booking-btn.secondary {
      background: #333;
      color: #fff;
    }
    .booking-btn.secondary:hover {
      background: #444;
    }
    .form-error {
      color: #e05c5c;
      font-size: 13px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .form-success {
      color: #8fd18f;
      font-size: 13px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .text-link {
      background: none;
      border: none;
      color: #b59e5c;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      text-decoration: none;
    }
    .text-link:hover {
      text-decoration: underline;
    }
    .profile-panel {
      background: #202020;
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 24px;
      padding: 18px;
    }
    .profile-panel h3 {
      color: #b59e5c;
      font-size: 18px;
      margin: 0;
    }
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .profile-section {
      min-width: 0;
    }
    .profile-section-title {
      color: #ccc;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .appointment-item {
      background: #222;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .appointment-info {
      flex: 1;
    }
    .appointment-info h3 {
      color: #b59e5c;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .appointment-info p {
      margin-bottom: 4px;
      font-size: 14px;
      color: #ccc;
    }
    .btn-cancel {
      background: #c0392b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      white-space: nowrap;
    }
    .btn-cancel:hover {
      background: #e74c3c;
    }
    .btn-cancel:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .cabinet-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    .cabinet-top h2 {
      margin: 0;
      font-size: 22px;
    }
    .no-appointments {
      text-align: center;
      color: #888;
      padding: 60px 20px;
      font-size: 16px;
    }
    .no-appointments-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }
    .back-to-site {
      text-align: center;
      margin-top: 30px;
    }
    .back-to-site a {
      color: #b59e5c;
      text-decoration: none;
      font-size: 14px;
    }
    .back-to-site a:hover {
      text-decoration: underline;
    }
    @media (max-width: 640px) {
      .cabinet-container {
        margin: 0;
        min-height: 100vh;
        border-radius: 0;
        padding: 18px 14px;
      }
      .cabinet-header h1 {
        font-size: 24px;
      }
      .cabinet-top {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .cabinet-actions {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 8px !important;
      }
      .booking-btn.small {
        width: 100%;
        min-width: 0;
        padding-left: 10px;
        padding-right: 10px;
      }
      .cabinet-actions .booking-btn:last-child {
        grid-column: 1 / -1;
      }
      .appointment-item {
        align-items: stretch;
        flex-direction: column;
      }
      .profile-grid {
        grid-template-columns: 1fr;
      }
      .btn-cancel {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="cabinet-container">
    <div class="cabinet-header">
      <h1>Личный кабинет</h1>
      <p>Барбершоп «Андрей Палыч»</p>
    </div>

    <!-- Форма входа -->
    <div id="login-form" class="screen active">
      <div class="login-form">
        <input id="login-phone" class="booking-input" placeholder="Номер телефона (+375...)">
        <input id="login-password" class="booking-input" type="password" placeholder="Пароль">
        <div id="login-error" class="form-error" style="display: none;"></div>
        <button class="booking-btn" onclick="clientLogin()">Войти</button>
        <div style="text-align:center; margin-top: 14px;">
          <button class="text-link" onclick="showResetForm()">Забыл пароль?</button>
        </div>
        
        <div class="back-to-site">
          <a href="/">← Вернуться на сайт</a>
        </div>
      </div>
    </div>

    <!-- Восстановление пароля -->
    <div id="reset-form" class="screen">
      <div class="login-form">
        <div id="reset-step-phone">
          <input id="reset-phone" class="booking-input" placeholder="Номер телефона (+375...)">
          <div id="reset-request-error" class="form-error" style="display: none;"></div>
          <div id="reset-request-success" class="form-success" style="display: none;"></div>
          <button id="reset-request-btn" class="booking-btn" onclick="requestPasswordReset()">Получить SMS-код</button>
        </div>

        <div id="reset-step-code" style="display: none;">
          <input id="reset-code" class="booking-input" inputmode="numeric" maxlength="6" placeholder="Код из SMS">
          <div id="reset-verify-error" class="form-error" style="display: none;"></div>
          <div id="reset-verify-success" class="form-success" style="display: none;"></div>
          <button id="reset-verify-btn" class="booking-btn" onclick="verifyPasswordResetCode()">Проверить код</button>
        </div>

        <div id="reset-step-password" style="display: none;">
          <input id="reset-new-password" class="booking-input" type="password" placeholder="Новый пароль">
          <div id="reset-confirm-error" class="form-error" style="display: none;"></div>
          <button class="booking-btn" onclick="confirmPasswordReset()">Сменить пароль</button>
        </div>

        <div class="back-to-site">
          <button class="text-link" onclick="showLoginForm()">← Вернуться ко входу</button>
        </div>
      </div>
    </div>

    <!-- Контент кабинета -->
    <div id="cabinet-content" class="screen">
      <div class="cabinet-top">
        <h2>Мои записи</h2>
        <div class="cabinet-actions" style="display: flex; gap: 10px;">
          <button class="booking-btn small" onclick="openBookingWidget()">+ Новая запись</button>
          <button class="booking-btn small secondary" onclick="toggleProfilePanel()">Профиль</button>
          <button class="booking-btn small" onclick="clientLogout()">Выйти</button>
        </div>
      </div>

      <div id="profile-panel" class="profile-panel" style="display: none;">
        <div class="profile-header">
          <h3>Профиль</h3>
          <button class="text-link" onclick="toggleProfilePanel(false)">Закрыть</button>
        </div>
        <div class="profile-grid">
          <div class="profile-section">
            <div class="profile-section-title">Имя</div>
            <input id="profile-name" class="booking-input" placeholder="Ваше имя">
            <div id="profile-name-message" class="form-success" style="display: none;"></div>
            <div id="profile-name-error" class="form-error" style="display: none;"></div>
            <button class="booking-btn small" onclick="updateProfileName()">Сохранить имя</button>
          </div>
          <div class="profile-section">
            <div class="profile-section-title">Пароль</div>
            <input id="current-password" class="booking-input" type="password" placeholder="Текущий пароль">
            <input id="new-password" class="booking-input" type="password" placeholder="Новый пароль">
            <div id="password-message" class="form-success" style="display: none;"></div>
            <div id="password-error" class="form-error" style="display: none;"></div>
            <button class="booking-btn small" onclick="changePassword()">Изменить пароль</button>
          </div>
        </div>
      </div>
      
      <div id="appointments-list"></div>
      
      <div id="no-appointments" class="no-appointments" style="display: none;">
        <span class="no-appointments-icon">📅</span>
        <div>У вас нет предстоящих записей</div>
        <button class="booking-btn" onclick="openBookingWidget()" style="margin-top: 20px; max-width: 200px;">
          Записаться на услугу
        </button>
      </div>
      
      <div class="back-to-site">
        <a href="/">← Вернуться на сайт</a>
      </div>
    </div>
  </div>

  <!-- Подключаем скрипт -->
  <script src="client-cabinet.js"></script>
</body>
</html>
